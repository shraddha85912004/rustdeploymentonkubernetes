apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustdeployment
  labels:
    app: rustdeployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rustdeployment
  template:
    metadata:
      labels:
        app: rustdeployment
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: rustdeployment
        image: ghcr.io/shraddha85912004/rustdeploymentonkubernetes:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: RUST_LOG
          value: "info"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
